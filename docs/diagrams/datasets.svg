reverse link DatasetWithConfidence to DatasetWithLabels--><path d="M633,294.13 C633,310.01 633,326.6 633,340.72 " fill="none" id="DatasetWithConfidence&lt;-DatasetWithLabels" style="stroke: #A80036; stroke-width: 1.0;"/><polygon fill="#FFFFFF" points="633,281.02,629,287.02,633,293.02,637,287.02,633,281.02" style="stroke: #A80036; stroke-width: 1.0;"/><!--MD5=[bd694b29f202fc1b62e9cf4fc70c2dbd]
@startuml datasets

package datasets{

    class torch.Dataset

    interface DatasetWithLabels{
        Any labels
        Any data
    }

    class DatasetWithConfidence {
        DatasetWithLabels dataset
        torch.Tensor confidence
        int __len__()
        dict __getitem__(int idx)
    }
    class DatasetWithConfidence extends torch.Dataset

    class module_functions{
        torch.Tensor init_confidence_from_csv(dataset: Dataset, path: Optional[Path])
        save_confidence_to_csv(confidence_dataset: DatasetWithConfidence, path: Path)
    }

    DatasetWithConfidence o- - DatasetWithLabels

}

@enduml

