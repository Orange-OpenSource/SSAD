[tool.poetry]
name = "ssad"
version = "0.1.0"
description = "Provides tool to perform neural network self-supervised learning using pytorch and lightning."
authors = ["samuel.berlemont <samuel.berlemont@orange.com>", "Mohammed Achraf El Khamlichi"]
readme = "README.MD"
license = "MIT"
repository = "https://gitlab.tech.orange/device-management-a-r/recherche/smart-monitoring/self-supervised-ad"
packages = [
    {include = "ssad"},
    {include = "ssad/py.typed"},
]


[tool.poetry.dependencies]
python = "^3.12"
category_encoders = "2.8.1"
matplotlib = "3.10.3"
numpy = "1.26.4"
pandas = "2.3.0"
pandas-stubs = "^2.2.2.240603"
torch = "2.5.1"
torchvision = "0.20.1"
lightning = "2.5.1.post0"
psutil = "7.0.0"
mlflow = "2.21.3"
scipy = "1.15.3"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
